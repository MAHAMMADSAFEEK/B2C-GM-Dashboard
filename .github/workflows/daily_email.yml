name: Daily GM Report Email

on:
  # Manual trigger — keep for ad-hoc runs
  workflow_dispatch:

  # Fire automatically right after the data sync workflow completes.
  # NOTE: this must match the `name:` inside sync_data.yml exactly.
  workflow_run:
    workflows: ["🤖 Metabase to GitHub Sync"]
    types: [completed]

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send Daily GM Report
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_USER: purushottam.shinde@solarsquare.in
          REPORT_TO: safeek.m@solarsquare.in
        run: python send_daily_report.py
